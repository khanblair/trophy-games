name: Sync Football Data

on:
  schedule:
    # Live matches: every 5 minutes
    # Odds API: every 12 hours
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Sync action'
        required: true
        default: 'sync_all'
        type: choice
        options:
          - sync_all
          - sync_odds
          - sync_live

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync Football Data
        run: |
          curl -X POST "${{ secrets.VERCEL_URL }}/api/sync" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{"action": "${{ github.event.inputs.action || 'sync_all' }}"'
        env:
          VERCEL_URL: ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Report Status
        if: always()
        run: |
          echo "Sync completed at $(date)"
