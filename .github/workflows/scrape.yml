name: Scrape Football Matches

on:
  schedule:
    # Run every hour - adjust as needed
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
      
      - name: Run Scraper
        run: |
          bun run scrape
        env:
          CONVEX_DEPLOY_URL: ${{ secrets.CONVEX_DEPLOY_URL }}

      - name: Report Status
        if: always()
        run: |
          echo "Scraping completed at $(date)"
